# docker-compose.production.yml

volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13
    env_file: .env
    restart: always
    volumes:
      - pg_data:/var/lib/postgresql/data
  backend:
    image: florentsx/kittygram_backend
    env_file: .env
    depends_on:
      - db
    restart: always
    volumes:
      - static:/backend_static
      - media:/app/media
  frontend:
    env_file: .env
    image: florentsx/kittygram_frontend
    command: cp -r /app/build/. /static/
    volumes:
      - static:/static
  gateway:
    image: florentsx/kittygram_gateway
    env_file: .env
    depends_on:
      - backend
      - frontend
    restart: always
    volumes:
      - static:/static
      - media:/media
    ports:
      - 9000:80
